draft_init: ${model.draft_default}

# HF Trainer arguments. Keep these conservative for a single 40GB A100; override
# from the CLI for ablations and smoke jobs.
max_steps: 4000
num_train_epochs: 1
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
learning_rate: 2.0e-5
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
logging_steps: 10
save_steps: 500
eval_steps: 500
save_total_limit: 2
bf16: true
fp16: false
gradient_checkpointing: true
dataloader_drop_last: true
dataloader_num_workers: 2
remove_unused_columns: false
report_to_wandb: true
resume_from_checkpoint: null

# Debug-only: restrict the train split to N examples so max_steps repeatedly
# revisits a tiny fixed set. Use 0 for normal training.
overfit_samples: 0

# Frozen target forward options.
compile_target: false
